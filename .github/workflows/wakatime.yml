name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_PROJECTS: "False"       # Sembunyikan Nama Proyek
          SHOW_EDITORS: "False"        # Sembunyikan Editor Kode
          SHOW_COMMIT: "False"         # Sembunyikan Grafik Commit
          SHOW_LANGUAGE_PER_REPO: "False" # Sembunyikan Detail Per Repo
          SHOW_LOC_CHART: "False"      # Sembunyikan Grafik Baris Kode
          LOCALE: "id"
          FORCE_ADD: "True"
          TIME_RANGE: "all_time"
          BLOCKS: "░▒▓█"
