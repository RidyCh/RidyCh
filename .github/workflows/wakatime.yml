name: Waka Readme

on:
  schedule:
    # Berjalan otomatis setiap hari jam 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Membuat Anda bisa menjalankan workflow secara manual

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
