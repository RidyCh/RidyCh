name: Waka Readme

on:
  schedule:
    # Berjalan otomatis setiap hari jam 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan Anda menjalankan secara manual

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # # HANYA GUNAKAN INPUT YANG VALID DAN DIDUKUNG:
          # SHOW_OS: "False"             # Sembunyikan Sistem Operasi
          # SHOW_PROJECTS: "False"       # Sembunyikan Nama Proyek
          # SHOW_EDITORS: "False"        # Sembunyikan Editor Kode
          # SHOW_TIMEZONE: "False"       # Sembunyikan Zona Waktu
          # SHOW_COMMIT: "False"         # Sembunyikan Grafik Commit
          # SHOW_LANGUAGE_PER_REPO: "False" # Sembunyikan Detail Per Repo
          # SHOW_LOC_CHART: "False"      # Sembunyikan Grafik Baris Kode
          # Pengaturan Bahasa Indonesia:
          LOCALE: "id"
          # PILIHAN DESAIN GRAFIK BALOK (Pilih salah satu baris BLOCKS di bawah ini):
          BLOCKS: "░▒▓█"               # Model Balok Gradasi Halus (Rekomendasi)
          FORCE_ADD: "True"
